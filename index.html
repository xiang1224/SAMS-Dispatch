<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLink Dispatch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="contacts.png" type="image/x-icon">
    <style>
        :root {
            --bg-main: #121212;
            --bg-container: #1e1e1e;
            --bg-input: #2d2d2d;
            --primary: #ff4d4d;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --success: #00ffcc;
            --warning: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* 垂直居中 */
            align-items: center;
            /* 水平居中 */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-card {
            background-color: var(--bg-container);
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 1000px;
        }

        h2 {
            color: var(--primary);
            letter-spacing: 2px;
        }

        /* Tabs */
        .nav-tabs {
            border-bottom: 2px solid #333;
        }

        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            font-weight: bold;
            background: transparent;
        }

        .nav-tabs .nav-link.active {
            background: transparent;
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .nav-tabs .nav-link:hover {
            border-color: transparent;
            color: white;
        }

        /* 調度按鈕樣式 */
        .mode-btn {
            border: 2px solid #444;
            background: var(--bg-input);
            color: #aaa;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
            padding: 12px;
        }

        .mode-btn:focus,
        .mode-btn:active,
        .mode-btn:focus-visible,
        .btn-check:checked+.btn,
        .btn.active {
            box-shadow: none !important;
            outline: none !important;
            background: var(--bg-input);
            color: #aaa;
            border-color: #444;
        }

        .mode-btn:hover {
            background: #383838 !important;
            border-color: #666 !important;
            color: white !important;
        }

        .mode-btn.active[data-mode="dispatched"] {
            border-color: var(--success) !important;
            color: var(--success) !important;
            background: rgba(0, 255, 204, 0.08) !important;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
            box-shadow: inset 0 0 8px rgba(0, 255, 204, 0.05) !important;
        }

        .mode-btn.active[data-mode="dispatched"]:hover {
            background: rgba(0, 255, 204, 0.15) !important;
        }

        .mode-btn.active[data-mode="gps"] {
            border-color: var(--warning) !important;
            color: var(--warning) !important;
            background: rgba(255, 204, 0, 0.08) !important;
            text-shadow: 0 0 5px rgba(255, 204, 0, 0.3);
            box-shadow: inset 0 0 8px rgba(255, 204, 0, 0.05) !important;
        }

        .mode-btn.active[data-mode="gps"]:hover {
            background: rgba(255, 204, 0, 0.15) !important;
        }

        /* Input */
        .form-control {
            background-color: var(--bg-input);
            border: 2px solid #444;
            color: white;
        }

        .form-control:focus {
            background-color: var(--bg-input);
            color: white;
            border-color: var(--primary);
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #aaa !important;
            opacity: 1;
        }

        /* Result Area */
        .result-area {
            background-color: #050505;
            border-radius: 8px;
            min-height: 60px;
            border: 1px dashed #555;
            color: var(--success);
            cursor: pointer;
            transition: 0.15s;
        }

        .result-area:hover {
            background: #111;
        }

        /* Sidebar */
        .sidebar {
            background: #151515;
            border: 1px solid #333;
            border-radius: 8px;
            height: 450px;
        }

        .injury-list {
            overflow-y: auto;
            flex: 1;
        }

        .injury-item {
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #bbb;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .injury-item:hover {
            background: #252525;
            color: white;
        }

        .injury-item.active {
            background: #2d2424;
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: bold;
        }

        /* Main Panel */
        .main-panel {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            height: 450px;
            overflow-y: auto;
        }

        .step-item {
            padding: 12px 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            color: #e0e0e0;
        }

        .step-item:hover {
            background-color: #222;
            transform: translateX(2px);
        }

        .step-item.next-up {
            border-color: var(--primary);
            background-color: #251b1b;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.15);
        }

        .step-item.copied {
            opacity: 0.7;
            border-color: #222;
            background-color: #111;
            text-decoration: line-through;
            color: #999;
        }

        /* 階段分隔線 */
        .section-divider {
            padding: 6px 12px;
            background: #222;
            color: #888;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 2px;
            border-radius: 4px;
            margin: 4px 0;
            border: 1px solid #2a2a2a;
            cursor: default !important;
            transform: none !important;
        }

        .copy-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            background: #333;
            border-radius: 4px;
            color: #ddd;
        }

        .step-item.next-up .copy-badge {
            background: var(--primary);
            color: white;
            font-weight: bold;
        }

        /* Status */
        .status-msg {
            height: 25px;
            color: #afff00;
            font-weight: bold;
        }

        /* Hint */
        .hint-box {
            background: var(--bg-input);
            border-radius: 8px;
            color: #aaa;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        kbd {
            background: #444;
            padding: 2px 5px;
            border-radius: 4px;
            color: #fff;
        }

        /* 著作權頁尾樣式（修正置中對齊） */
        .custom-footer {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid #222;
            color: #555;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="card main-card p-4">

        <h2 class="text-center mb-4">MedLink Dispatch</h2>

        <ul class="nav nav-tabs justify-content-center mb-4" id="mainTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dispatch-tab">
                    311r 調度
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#treatment-tab">
                    醫療 /me 小助手
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <div class="tab-pane fade show active" id="dispatch-tab">

                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <button class="btn w-100 mode-btn active" data-mode="dispatched"
                            onclick="setDispatchMode('dispatched')">
                            1. 已派遣
                        </button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn w-100 mode-btn" data-mode="gps" onclick="setDispatchMode('gps')">
                            2. 詢問定位 (GPS)
                        </button>
                    </div>
                </div>

                <input type="text" id="charID" class="form-control text-center py-3 fs-5 mb-3"
                    placeholder="輸入 ID 後按 Enter" autocomplete="off" autofocus>

                <div id="dispatch-output"
                    class="result-area d-flex justify-content-center align-items-center p-4 fs-5 mb-2"
                    onclick="copyDispatch()">
                    等待輸入...
                </div>

                <div id="dispatch-status" class="status-msg text-center mb-3"></div>

                <div class="hint-box p-3">
                    • <kbd>Enter</kbd>：複製指令並清空輸入框<br>
                    • <kbd>Tab</kbd>：快速切換「已派遣 / 要定位」
                </div>

            </div>

            <div class="tab-pane fade" id="treatment-tab">

                <div class="row g-3">
                    <div class="col-lg-4">
                        <div class="sidebar d-flex flex-column p-2">
                            <input type="text" id="searchBar" class="form-control mb-2" placeholder="🔍 搜尋傷勢... (快捷鍵 F)"
                                autocomplete="off">
                            <div class="injury-list d-flex flex-column gap-1" id="injury-container"></div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="main-panel p-3 d-flex flex-column gap-2" id="step-container"></div>
                    </div>
                </div>

                <div id="treatment-status" class="status-msg text-center mt-3"></div>

                <div class="hint-box p-3 mt-2">
                    • <kbd>F</kbd>：快速聚焦搜尋框 |
                    <kbd>↑</kbd> <kbd>↓</kbd>：切換傷勢項目 |
                    <kbd>Tab</kbd>：選定該傷勢並切換到步驟<br>
                    • <kbd>Enter</kbd>：自動複製右側紅框步驟，複製完切回遊戲貼上
                </div>

            </div>

        </div>

    </div>

    <footer class="custom-footer">
        &copy; 2026 暈船仔丨小翔丨. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==========================================
        // 資料庫中心

    const treatmentMessages = {

                "/me 傷口覆蓋無菌敷料並使用繃帶固定",
                "/me 石膏固定患肢"
            ]
        },
        "drowning": {
            name: "溺水與呼吸衰竭急救",
            steps: [
                "---- 院外應急處置 ----",
                "/me 清除患者口鼻內泥沙與嘔吐物，保持呼吸道通暢",
                "/me 給予高濃度氧氣面罩",

        },
        "hypoglycemia": {

                "/me 檢查心臟及大血管壁並進行細緻縫合",
                "/me 使用大量溫生理食鹽水徹底沖洗胸腔",
                "/me 於患側置入胸腔引流管並連接水封瓶",
                "/me 使用不銹鋼鋼絲固定並縫合肋骨",
                "/me 依序逐層縫合胸壁肌肉、皮下組織與皮膚",

        },

                "/me 探查胃腸道破裂處並使用腸吻合器進行修補",
                "/me 使用數千毫升溫生理食鹽水反覆灌洗腹腔",
                "/me 於腹腔低位安置兩支矽膠引流管",
                "/me 仔細清點手術紗布與器械數目無誤",
                "/me 使用高強度縫線逐層縫合腹膜、筋膜與肌肉",
                "/me 使用外科縫線關閉腹壁皮膚傷口",
                "/me 敷設無菌敷料並妥善黏貼固定"

        let currentInjuryKey = 'fracture_surgery';
        let currentStepIndex = 0;
        let filteredKeys = Object.keys(treatmentMessages);

        // ==========================================
        // Dispatch Logic
        // ==========================================
        const input = document.getElementById('charID');
        const dispatchOutput = document.getElementById('dispatch-output');
        const dispatchStatus = document.getElementById('dispatch-status');

        let currentDispatchMode = 'dispatched';

        const dispatchMessages = {
            dispatched: "醫護已派遣，請耐心等候",
            gps: "請按壓/311p按鈕，發送GPS定位，以利醫護同仁搜救作業"
        };

        function setDispatchMode(mode) {
            currentDispatchMode = mode;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            dispatchOutput.style.color = mode === 'dispatched' ? '#00ffcc' : '#ffcc00';
            updateDispatchOutput();
        }

        function updateDispatchOutput() {
            const val = input.value.trim();
            dispatchOutput.innerText = val ? `/311r ${val} ${dispatchMessages[currentDispatchMode]}` : '等待輸入...';
        }

        input.addEventListener('input', updateDispatchOutput);

        // ==========================================
        // Medical Logic
        // ==========================================
        const searchBar = document.getElementById('searchBar');
        const injuryContainer = document.getElementById('injury-container');
        const stepContainer = document.getElementById('step-container');
        const treatmentStatus = document.getElementById('treatment-status');

        function initMedicalTab() {
            renderInjuryList();
            checkAndSkipDivider();
            renderSteps();
        }

        function checkAndSkipDivider() {
            const steps = treatmentMessages[currentInjuryKey]?.steps || [];
            if (steps[currentStepIndex] && steps[currentStepIndex].startsWith('----')) {
                currentStepIndex++;
            }
        }

        searchBar.addEventListener('input', () => {
            const query = searchBar.value.toLowerCase().trim();

            filteredKeys = Object.keys(treatmentMessages).filter(key => {
                return treatmentMessages[key].name.toLowerCase().includes(query) || key.includes(query);
            });

            renderInjuryList();

            if (filteredKeys.length > 0 && !filteredKeys.includes(currentInjuryKey)) {
                selectInjury(filteredKeys[0]);
            }
        });

        function renderInjuryList() {
            injuryContainer.innerHTML = '';
            filteredKeys.forEach(key => {
                const div = document.createElement('div');
                div.className = `injury-item ${key === currentInjuryKey ? 'active' : ''}`;
                div.innerText = treatmentMessages[key].name;
                div.onclick = () => selectInjury(key);
                injuryContainer.appendChild(div);
            });
        }

        function selectInjury(key) {
            currentInjuryKey = key;
            currentStepIndex = 0;
            renderInjuryList();
            checkAndSkipDivider();
            renderSteps();
        }

        function renderSteps() {
            stepContainer.innerHTML = '';
            const data = treatmentMessages[currentInjuryKey];
            if (!data) return;

            data.steps.forEach((text, index) => {
                const div = document.createElement('div');

                if (text.startsWith('----')) {
                    div.className = 'section-divider';
                    div.innerText = text.replace(/^-+\s*|\s*-+$/g, '');
                    stepContainer.appendChild(div);
                    return;
                }

                div.className = 'step-item';

                if (index === currentStepIndex) div.classList.add('next-up');
                if (index < currentStepIndex) div.classList.add('copied');

                div.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <span>${text}</span>
                        <span class="copy-badge">
                            ${index === currentStepIndex
                        ? 'ENTER 複製'
                        : (index < currentStepIndex ? '已複製' : '點擊複製')
                    }
                        </span>
                    </div>
                `;

                div.onclick = () => {
                    copyText(text);
                    currentStepIndex = index + 1;
                    checkAndSkipDivider();
                    renderSteps();
                };
                stepContainer.appendChild(div);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                treatmentStatus.innerText = `✅ 已複製: "${text}"`;
                setTimeout(() => { treatmentStatus.innerText = ''; }, 800);
            });
        }

        // ==========================================
        // Global Shortcuts
        // ==========================================
        document.addEventListener('keydown', (e) => {
            const isDispatchActive = document.getElementById('dispatch-tab').classList.contains('active');

            if (isDispatchActive) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    setDispatchMode(currentDispatchMode === 'dispatched' ? 'gps' : 'dispatched');
                }

                if (e.key === 'Enter') {
                    if (input.value.trim() !== "") {
                        copyDispatch();
                        input.value = '';
                        updateDispatchOutput();
                    }
                }
            } else {
                if (e.key.toLowerCase() === 'f' && document.activeElement !== searchBar) {
                    e.preventDefault();
                    searchBar.focus();
                    searchBar.select();
                }

                if (document.activeElement === searchBar) {
                    let currentIndex = filteredKeys.indexOf(currentInjuryKey);

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        let nextIndex = (currentIndex + 1) % filteredKeys.length;
                        selectInjury(filteredKeys[nextIndex]);
                    }

                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        let prevIndex = (currentIndex - 1 + filteredKeys.length) % filteredKeys.length;
                        selectInjury(filteredKeys[prevIndex]);
                    }

                    if (e.key === 'Tab' || e.key === 'Enter') {
                        e.preventDefault();
                        searchBar.blur();
                    }
                    return;
                }

                if (e.key === 'Enter') {
                    const steps = treatmentMessages[currentInjuryKey].steps;

                    if (currentStepIndex < steps.length) {
                        copyText(steps[currentStepIndex]);
                        currentStepIndex++;
                        checkAndSkipDivider();
                        renderSteps();
                    } else {
                        treatmentStatus.innerText = '✨ 本輪處置已全部完成！按 F 搜尋下一單。';
                    }
                }
            }
        });

        function copyDispatch() {
            const text = dispatchOutput.innerText;
            if (text === '等待輸入...') return;

            navigator.clipboard.writeText(text).then(() => {
                dispatchStatus.innerText = '✅ 已複製調度指令！';
                setTimeout(() => { dispatchStatus.innerText = ''; }, 1000);
            });
        }

        initMedicalTab();
    </script>
</body>

</html>
